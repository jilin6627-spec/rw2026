name: Railway Fix Build
on:
  push:
    branches: [ railway-fix ]
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: railway-fix
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download Xray
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/xray-linux-64.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -p /tmp/xray-linux-64.zip xray > /tmp/xray
          chmod +x /tmp/xray
      - name: Generate config template
        run: |
          mkdir -p railway-fix/tmp
          cat > railway-fix/tmp/xray-config.json.template <<'JSON'
          {
            "log": { "loglevel": "warning", "access": "/app/tmp/xray-access.log" },
            "inbounds": [{ "port": 3000, "listen": "0.0.0.0", "protocol": "vmess",
              "settings": { "clients": [{ "id": "REPLACE_WITH_UUID", "alterId": 0 }] },
              "streamSettings": { "network": "ws", "wsSettings": { "path": "/" } } }],
            "outbounds": [{ "protocol": "freedom", "settings": {} }]
          }
          JSON
      - uses: docker/build-push-action@v5
        with:
          context: railway-fix
          file: railway-fix/Dockerfile
          push: true
          tags:
            - ghcr.io/jilin6627-spec/rw2026:v1.0.1
            - ghcr.io/jilin6627-spec/rw2026:latest
